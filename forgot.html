<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Восстановление пароля</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
        body { background: #f0f4ff; display: flex; justify-content: center; align-items: center; height: 100vh; }
        .container { background: white; padding: 40px; border-radius: 24px; box-shadow: 0 10px 40px rgba(0,0,0,0.1); width: 400px; }
        h1 { text-align: center; font-size: 24px; margin-bottom: 10px; color: #1a1a2e; }
        p.sub { text-align: center; color: #888; margin-bottom: 30px; }
        label { display: block; font-weight: 600; margin-bottom: 5px; color: #333; }
        input { width: 100%; padding: 12px; border: 2px solid #e0e4f0; border-radius: 10px; margin-bottom: 20px; font-size: 16px; }
        input:focus { border-color: #4a6cf7; outline: none; }
        button { width: 100%; padding: 14px; background: linear-gradient(135deg, #4a6cf7, #3a5ad7); color: white; border: none; border-radius: 10px; font-size: 18px; font-weight: 600; cursor: pointer; transition: 0.3s; }
        button:hover { background: #3a5ad7; transform: scale(1.02); }
        .links { text-align: center; margin-top: 20px; }
        .links a { color: #4a6cf7; text-decoration: none; }
        .links a:hover { text-decoration: underline; }
        .message { text-align: center; color: green; font-size: 14px; margin-bottom: 10px; display: none; }
        .error { text-align: center; color: red; font-size: 14px; margin-bottom: 10px; display: none; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔐 Восстановление пароля</h1>
        <p class="sub">Введите ваш логин (ИНН) и email для получения ссылки</p>
        <div id="message" class="message">✅ Ссылка для сброса отправлена на ваш email</div>
        <div id="error" class="error"></div>
        <form id="forgotForm" onsubmit="return requestReset(event)">
            <label>Логин (ИНН)</label>
            <input type="text" id="username" placeholder="Введите ИНН" required>
            <label>Email</label>
            <input type="email" id="email" placeholder="Введите ваш email" required>
            <button type="submit">Отправить ссылку</button>
        </form>
        <div class="links">
            <a href="/login.html">← Вернуться к входу</a>
        </div>
    </div>

    <script>
        function requestReset(e) {
            e.preventDefault();
            const username = document.getElementById('username').value.trim();
            const email = document.getElementById('email').value.trim();
            const message = document.getElementById('message');
            const error = document.getElementById('error');
            message.style.display = 'none';
            error.style.display = 'none';

            if (!username || !email) {
                error.textContent = 'Заполните все поля';
                error.style.display = 'block';
                return false;
            }

            fetch('/forgot', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, email })
            })
            .then(response => response.json())
            .then(data => {
                if (data.success) {
                    message.style.display = 'block';
                    document.getElementById('username').value = '';
                    document.getElementById('email').value = '';
                } else {
                    error.textContent = data.message || 'Ошибка';
                    error.style.display = 'block';
                }
            })
            .catch(err => {
                error.textContent = 'Ошибка подключения к серверу';
                error.style.display = 'block';
                console.error(err);
            });

            return false;
        }
    </script>
</body>
</html>
