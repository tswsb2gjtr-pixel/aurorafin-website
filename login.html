<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход — Aurora Fin</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
        body { background: #f0f4ff; display: flex; justify-content: center; align-items: center; height: 100vh; }
        .login-container { background: white; padding: 40px; border-radius: 20px; box-shadow: 0 10px 40px rgba(0,0,0,0.1); width: 400px; }
        .login-container h1 { text-align: center; margin-bottom: 10px; font-size: 28px; color: #1a1a2e; }
        .login-container .sub { text-align: center; color: #888; margin-bottom: 30px; }
        .login-container label { display: block; font-weight: 600; margin-bottom: 5px; color: #333; }
        .login-container input { width: 100%; padding: 12px; border: 2px solid #e0e4f0; border-radius: 10px; margin-bottom: 20px; font-size: 16px; }
        .login-container input:focus { border-color: #4a6cf7; outline: none; }
        .login-container button { width: 100%; padding: 14px; background: #4a6cf7; color: white; border: none; border-radius: 10px; font-size: 18px; font-weight: 600; cursor: pointer; transition: 0.3s; margin-bottom: 10px; }
        .login-container button:hover { background: #3a5ad7; }
        .login-container .btn-register { background: #22c55e; }
        .login-container .btn-register:hover { background: #16a34a; }
        .login-container .links { text-align: center; margin-top: 10px; font-size: 14px; color: #888; }
        .login-container .links a { color: #4a6cf7; text-decoration: none; }
        .login-container .links a:hover { text-decoration: underline; }
        .error { color: red; font-size: 14px; text-align: center; margin-bottom: 10px; display: none; }
        .success { color: green; font-size: 14px; text-align: center; margin-bottom: 10px; display: none; }
    </style>
</head>
<body>
    <div class="login-container">
        <h1>🔐 Вход</h1>
        <p class="sub">Войдите в личный кабинет Aurora Fin</p>
        <div id="error" class="error">Неверный логин или пароль</div>
        <div id="success" class="success">Регистрация успешна! Теперь войдите.</div>
        <form id="loginForm" onsubmit="return login(event)">
            <label>Логин</label>
            <input type="text" id="username" placeholder="Введите логин" required>
            <label>Пароль</label>
            <input type="password" id="password" placeholder="Введите пароль" required>
            <button type="submit">Войти</button>
        </form>
        <button class="btn-register" onclick="register()">📝 Зарегистрироваться</button>
        <div class="links">
            <a href="/">← На главную</a>
        </div>
    </div>

    <script>
        // Хранилище пользователей (в реальном проекте — база данных)
        let users = JSON.parse(localStorage.getItem('users')) || {};

        function login(e) {
            e.preventDefault();
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const error = document.getElementById('error');
            const success = document.getElementById('success');

            error.style.display = 'none';
            success.style.display = 'none';

            // Проверяем в localStorage
            if (users[username] && users[username] === password) {
                localStorage.setItem('loggedIn', 'true');
                localStorage.setItem('username', username);
                // Сразу запускаем Аврору
                window.location.href = '/run_aurora_direct';
            } else {
                error.style.display = 'block';
            }
            return false;
        }

        function register() {
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const error = document.getElementById('error');
            const success = document.getElementById('success');

            error.style.display = 'none';
            success.style.display = 'none';

            if (!username || !password) {
                error.textContent = 'Заполните логин и пароль';
                error.style.display = 'block';
                return;
            }

            if (users[username]) {
                error.textContent = 'Пользователь уже существует';
                error.style.display = 'block';
                return;
            }

            users[username] = password;
            localStorage.setItem('users', JSON.stringify(users));
            success.style.display = 'block';
            document.getElementById('username').value = '';
            document.getElementById('password').value = '';
        }
    </script>
</body>
</html>
