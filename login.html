<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход — Aurora Fin</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f0f4ff; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 24px; }
        .login-container { max-width: 400px; width: 100%; background: white; padding: 40px; border-radius: 24px; box-shadow: 0 10px 40px rgba(0,0,0,0.1); }
        .logo { font-size: 28px; font-weight: 800; text-align: center; margin-bottom: 32px; color: #1a1a2e; }
        .logo span { color: #4a6cf7; }
        .form-title { font-size: 24px; font-weight: 700; margin-bottom: 8px; text-align: center; color: #1a1a2e; }
        .form-sub { color: #888; font-size: 14px; margin-bottom: 32px; text-align: center; }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; font-size: 14px; font-weight: 600; color: #333; margin-bottom: 6px; }
        .form-group input { width: 100%; padding: 12px 16px; border: 2px solid #e0e4f0; border-radius: 12px; font-size: 16px; transition: 0.2s; }
        .form-group input:focus { border-color: #4a6cf7; outline: none; }
        .checkbox-group { display: flex; align-items: center; justify-content: space-between; margin-bottom: 24px; }
        .checkbox-group label { display: flex; align-items: center; gap: 8px; font-size: 14px; color: #555; cursor: pointer; }
        .checkbox-group input[type="checkbox"] { width: 18px; height: 18px; accent-color: #4a6cf7; }
        .checkbox-group a { color: #4a6cf7; font-size: 14px; text-decoration: none; }
        .checkbox-group a:hover { text-decoration: underline; }
        .btn { width: 100%; padding: 14px; background: #4a6cf7; color: white; border: none; border-radius: 30px; font-size: 18px; font-weight: 600; cursor: pointer; transition: 0.3s; }
        .btn:hover { background: #3a5ad7; transform: translateY(-2px); }
        .btn-register { background: #22c55e; margin-top: 12px; }
        .btn-register:hover { background: #16a34a; }
        .toggle-link { text-align: center; margin: 20px 0; color: #888; font-size: 14px; }
        .toggle-link a { color: #4a6cf7; cursor: pointer; font-weight: 600; }
        .toggle-link a:hover { text-decoration: underline; }
        .back-link { display: block; text-align: center; margin-top: 24px; color: #888; text-decoration: none; font-size: 14px; }
        .back-link:hover { color: #4a6cf7; }
        .hidden { display: none !important; }
        .register-fields { border-top: 1px solid #e0e4f0; padding-top: 20px; margin-top: 8px; }
        .error, .success { font-size: 14px; text-align: center; padding: 10px 12px; border-radius: 12px; margin-bottom: 16px; display: none; }
        .error { background: #fee2e2; color: #991b1b; border: 1px solid #fca5a5; }
        .success { background: #dcfce7; color: #166534; border: 1px solid #86efac; }
        @media (max-width: 480px) { .login-container { padding: 24px; } }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="logo">Aurora<span>Fin</span></div>
        <div class="form-title" id="formTitle">Вход в аккаунт</div>
        <div class="form-sub" id="formSub">Войдите, чтобы продолжить</div>

        <div id="error" class="error">Неверный логин или пароль</div>
        <div id="success" class="success">Регистрация успешна! Теперь войдите.</div>

        <form id="loginForm" onsubmit="return login(event)">
            <div id="loginFields">
                <div class="form-group">
                    <label id="label_username">Логин (ИНН)</label>
                    <input type="text" id="username" placeholder="Введите ИНН" required>
                </div>
                <div class="form-group">
                    <label id="label_password">Пароль</label>
                    <input type="password" id="password" placeholder="Введите пароль" required>
                </div>
                <div class="checkbox-group">
                    <label><input type="checkbox" id="remember" checked> <span id="remember_text">Запомнить меня</span></label>
                    <a href="/forgot.html" id="forgot_link">Забыли пароль?</a>
                </div>
                <!-- Капча удалена -->
            </div>

            <div id="registerFields" class="register-fields hidden">
                <div class="form-group"><label id="label_fullname">Полное имя</label><input type="text" id="fullname" placeholder="Введите полное имя"></div>
                <div class="form-group"><label id="label_company">Компания</label><input type="text" id="company" placeholder="Наименование компании"></div>
                <div class="form-group"><label id="label_email">Email</label><input type="email" id="email" placeholder="Введите email"></div>
                <div class="form-group"><label id="label_password2">Повторите пароль</label><input type="password" id="password2" placeholder="Повторите пароль"></div>
                <div class="form-group"><label id="label_role">Роль</label>
                    <select id="role">
                        <option value="owner">Владелец</option>
                        <option value="director">Директор</option>
                        <option value="employee">Сотрудник</option>
                    </select>
                </div>
            </div>

            <button type="submit" id="submitBtn" class="btn">Войти</button>
        </form>

        <button class="btn btn-register" id="registerBtn" onclick="register()" style="display:none;">📝 Зарегистрироваться</button>

        <div class="toggle-link">
            <span id="toggleText">Нет аккаунта?</span>
            <a id="toggleLink" onclick="toggleForm()">Зарегистрироваться</a>
        </div>

        <a href="/" class="back-link">← На главную</a>
    </div>

    <script>
        let users = JSON.parse(localStorage.getItem('users')) || {};
        let isRegisterMode = false;

        function toggleForm() {
            isRegisterMode = !isRegisterMode;
            const reg = document.getElementById('registerFields');
            const login = document.getElementById('loginFields');
            const submit = document.getElementById('submitBtn');
            const regBtn = document.getElementById('registerBtn');
            const toggleLink = document.getElementById('toggleLink');
            const toggleText = document.getElementById('toggleText');
            const formTitle = document.getElementById('formTitle');
            const formSub = document.getElementById('formSub');

            if (isRegisterMode) {
                reg.classList.remove('hidden');
                login.style.display = 'none';
                submit.style.display = 'none';
                regBtn.style.display = 'block';
                toggleLink.textContent = 'Войти';
                toggleText.textContent = 'Уже есть аккаунт?';
                formTitle.textContent = 'Создайте аккаунт';
                formSub.textContent = 'Заполните данные для регистрации';
                document.getElementById('error').style.display = 'none';
                document.getElementById('success').style.display = 'none';
            } else {
                reg.classList.add('hidden');
                login.style.display = 'block';
                submit.style.display = 'block';
                regBtn.style.display = 'none';
                toggleLink.textContent = 'Зарегистрироваться';
                toggleText.textContent = 'Нет аккаунта?';
                formTitle.textContent = 'Вход в аккаунт';
                formSub.textContent = 'Войдите, чтобы продолжить';
            }
        }

        function login(e) {
            e.preventDefault();
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            const remember = document.getElementById('remember').checked;
            const error = document.getElementById('error');
            const success = document.getElementById('success');
            error.style.display = 'none';
            success.style.display = 'none';

            if (!username || !password) {
                error.textContent = 'Заполните все поля';
                error.style.display = 'block';
                return false;
            }

            fetch('/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, password, remember })
            })
            .then(response => response.json())
            .then(data => {
                if (data.success) {
                    localStorage.setItem('loggedIn', 'true');
                    localStorage.setItem('username', username);
                    window.location.href = '/run_aurora_direct';
                } else {
                    error.textContent = data.message || 'Неверный логин или пароль';
                    error.style.display = 'block';
                }
            })
            .catch(() => {
                error.textContent = 'Ошибка подключения к серверу';
                error.style.display = 'block';
            });
            return false;
        }

        function register() {
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            const password2 = document.getElementById('password2').value;
            const fullname = document.getElementById('fullname').value.trim();
            const company = document.getElementById('company').value.trim();
            const email = document.getElementById('email').value.trim();
            const role = document.getElementById('role').value;
            const error = document.getElementById('error');
            const success = document.getElementById('success');
            error.style.display = 'none';
            success.style.display = 'none';

            if (!username || !password || !password2 || !fullname || !company || !email) {
                error.textContent = 'Заполните все поля';
                error.style.display = 'block';
                return;
            }

            if (username.length < 10 || username.length > 12) {
                error.textContent = 'ИНН должен содержать 10 или 12 цифр';
                error.style.display = 'block';
                return;
            }

            if (password.length < 4) {
                error.textContent = 'Пароль должен быть не менее 4 символов';
                error.style.display = 'block';
                return;
            }

            if (password !== password2) {
                error.textContent = 'Пароли не совпадают';
                error.style.display = 'block';
                return;
            }

            if (users[username]) {
                error.textContent = 'Пользователь с таким ИНН уже существует';
                error.style.display = 'block';
                return;
            }

            users[username] = {
                password: password,
                fullname: fullname,
                company: company,
                email: email,
                role: role
            };
            localStorage.setItem('users', JSON.stringify(users));
            success.style.display = 'block';
            document.getElementById('username').value = '';
            document.getElementById('password').value = '';
            document.getElementById('password2').value = '';
            document.getElementById('fullname').value = '';
            document.getElementById('company').value = '';
            document.getElementById('email').value = '';

            setTimeout(() => {
                if (isRegisterMode) toggleForm();
                success.style.display = 'none';
            }, 1500);
        }

        if (localStorage.getItem('loggedIn') === 'true') {
            window.location.href = '/run_aurora_direct';
        }
    </script>
</body>
</html>
